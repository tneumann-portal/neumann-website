<style>
:root {
  --rose: #c8756a;
  --rose-light: #f5ede9;
  --rose-mid: #e8b5ab;
  --green: #4a6741;
  --green-light: #eef2ec;
  --cream: #faf8f5;
  --stone: #8a8078;
  --dark: #2a2320;
  --border: #e8e2db;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.site-header {
  width: 100%;
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.logo-mark {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--rose-light);
  border: 1px solid var(--rose-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--rose);
  flex-shrink: 0;
}
.logo-text { flex: 1; }
.logo-text h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.2;
}
.logo-text p {
  font-size: 11px;
  color: var(--stone);
  margin-top: 1px;
  font-weight: 300;
}
.header-address {
  font-size: 11px;
  color: var(--stone);
  text-align: right;
  font-weight: 300;
  line-height: 1.6;
}
.header-address a { color: var(--rose); text-decoration: none; }

/* MAIN LAYOUT */
.main {
  width: 100%;
  max-width: 460px;
  padding: 32px 20px 60px;
  flex: 1;
}

/* PHONE FRAME */
.phone-frame {
  background: #fff;
  border-radius: 24px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(42,35,32,0.06);
}

/* CHAT HEADER */
.chat-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--rose-light);
  border: 1px solid var(--rose-mid);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; color: var(--rose); flex-shrink: 0;
  transition: all 0.3s;
}
.chat-avatar.green-av {
  background: var(--green-light);
  border-color: #b5c9b2;
  color: var(--green);
}
.chat-info { flex: 1; }
.chat-name {
  font-size: 13px; font-weight: 500; color: var(--dark);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
}
.chat-sub { font-size: 11px; color: #7ab87a; margin-top: 1px; font-weight: 300; }
.lang-toggle {
  font-size: 11px; padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--stone); cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.lang-toggle:hover { border-color: var(--rose-mid); color: var(--rose); }

/* MESSAGES */
.messages {
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 280px; max-height: 380px; overflow-y: auto;
  background: var(--cream);
}
.msg { display: flex; flex-direction: column; max-width: 88%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble {
  padding: 9px 13px; border-radius: 16px;
  font-size: 13px; line-height: 1.55;
}
.msg.bot .bubble {
  background: #fff; color: var(--dark);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.user .bubble {
  background: var(--rose); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-time {
  font-size: 10px; color: var(--stone); margin-top: 3px; padding: 0 4px;
  font-weight: 300;
}
.msg.user .msg-time { text-align: right; }

/* TYPING */
.typing-dots { display: flex; gap: 4px; padding: 2px 0; align-items: center; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--rose-mid);
  animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

/* CHIPS */
.chips-area {
  padding: 8px 14px 4px;
  display: flex; flex-wrap: wrap; gap: 6px;
  background: #fff;
  border-top: 1px solid var(--border);
}
.chip {
  padding: 6px 13px; border-radius: 20px;
  border: 1px solid var(--border);
  background: #fff; font-size: 12px; color: var(--dark);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.18s;
}
.chip:hover { border-color: var(--rose-mid); background: var(--rose-light); color: var(--rose); }
.chip.dr-michael { border-color: #b5c9b2; }
.chip.dr-michael:hover { background: var(--green-light); color: var(--green); border-color: var(--green); }
.chip.emergency { border-color: #e8b0a8; color: #c0504a; }
.chip.emergency:hover { background: #fdf0ee; }
.chip.success-chip { border-color: #b5c9b2; color: var(--green); }
.chip.success-chip:hover { background: var(--green-light); }

/* SLOT GRID */
.slot-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; padding: 8px 14px 4px;
  background: #fff; border-top: 1px solid var(--border);
}
.slot {
  padding: 10px 10px; border-radius: 10px;
  border: 1px solid var(--border);
  background: #fff; cursor: pointer; text-align: center;
  transition: all 0.18s;
}
.slot:hover { border-color: var(--rose-mid); background: var(--rose-light); }
.slot-day { font-size: 10px; color: var(--stone); font-weight: 400; }
.slot-dr { font-size: 10px; color: var(--stone); font-style: italic; margin-top: 1px; }
.slot-time { font-size: 15px; font-weight: 500; color: var(--dark); margin-top: 2px; font-family: 'Cormorant Garamond', serif; }

/* CONFIRM BOX */
.confirm-area { padding: 0 14px 8px; background: #fff; }
.confirm-box {
  padding: 12px 14px; border-radius: 12px;
  border: 1px solid #b5c9b2; background: var(--green-light);
  font-size: 12px; color: var(--green); line-height: 1.6;
}
.confirm-title { font-weight: 500; margin-bottom: 3px; font-size: 13px; }

/* BADGE */
.ki-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; padding: 2px 8px; border-radius: 8px;
  background: var(--rose-light); color: var(--rose);
  margin-bottom: 4px; font-weight: 400;
}

/* TABS */
.vtabs {
  display: flex; gap: 0;
  border-top: 1px solid var(--border); background: #fff;
}
.vtab {
  flex: 1; padding: 9px; font-size: 11px;
  border: none; background: transparent;
  cursor: pointer; color: var(--stone);
  font-family: 'DM Sans', sans-serif;
  border-bottom: 2px solid transparent;
  transition: all 0.18s;
}
.vtab.active { color: var(--rose); border-bottom-color: var(--rose); }
.vtab:hover:not(.active) { color: var(--dark); }

/* DOCTOR VIEW */
.doc-panel {
  padding: 14px; background: var(--cream);
  display: flex; flex-direction: column; gap: 10px;
  max-height: 460px; overflow-y: auto;
}
.doc-card {
  background: #fff; border-radius: 14px;
  border: 1px solid var(--border); padding: 14px;
}
.doc-label {
  font-size: 10px; color: var(--stone); text-transform: uppercase;
  letter-spacing: .6px; margin-bottom: 8px; font-weight: 500;
}
.doc-dr-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  margin-bottom: 8px; font-weight: 400;
}
.doc-dr-badge.michael { background: var(--green-light); color: var(--green); border: 1px solid #b5c9b2; }
.doc-dr-badge.etelka { background: var(--rose-light); color: var(--rose); border: 1px solid var(--rose-mid); }
.doc-dr-badge.egal { background: #f5f2ee; color: var(--stone); border: 1px solid var(--border); }
.doc-row {
  display: flex; justify-content: space-between;
  font-size: 12px; padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.doc-row:last-child { border: none; }
.doc-k { color: var(--stone); font-weight: 300; }
.doc-v { color: var(--dark); font-weight: 500; text-align: right; max-width: 60%; }
.badge-done {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 8px; background: var(--green-light);
  color: var(--green); margin-bottom: 6px;
}
.badge-urgent {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 8px; background: #fdf0ee;
  color: #c0504a; margin-bottom: 6px;
}

/* INPUT ROW */
.input-row {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; background: #fff;
}
.txt-input {
  flex: 1; font-size: 13px; padding: 8px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--cream); color: var(--dark);
  font-family: 'DM Sans', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.txt-input:focus { border-color: var(--rose-mid); }
.send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--rose); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: background 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: #b5635a; }
.send-btn svg { width: 16px; height: 16px; }

/* FOOTER */
.portal-footer {
  width: 100%; text-align: center;
  font-size: 11px; color: var(--stone);
  padding: 20px; font-weight: 300;
}
.portal-footer a { color: var(--rose); text-decoration: none; }

/* DOCTOR SELECTOR CARDS */
.doctor-cards {
  display: flex; flex-direction: column; gap: 8px;
  padding: 8px 14px 4px; background: #fff;
  border-top: 1px solid var(--border);
}
.doctor-card-btn {
  padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; text-align: left; width: 100%;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.18s; display: flex; align-items: center; gap: 12px;
}
.doctor-card-btn:hover { border-color: var(--rose-mid); background: var(--rose-light); }
.doctor-card-btn.green-card:hover { border-color: #b5c9b2; background: var(--green-light); }
.doctor-card-btn.egal-card:hover { border-color: var(--border); background: #f8f5f1; }
.dc-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; flex-shrink: 0;
  overflow: hidden; border: 1.5px solid var(--border);
  background: var(--cream);
}
.dc-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.dc-avatar.rose-av { border-color: var(--rose-mid); }
.dc-avatar.green-av-sm { border-color: #b5c9b2; }
.dc-avatar.egal-av { background: #f0ece6; color: var(--stone); border: 1px solid var(--border); font-size:20px; }

/* PHONE INPUT ROW */
.phone-input-row { display: flex; gap: 6px; align-items: center; }
.country-picker-btn {
  font-size: 13px; padding: 7px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--cream);
  color: var(--dark); font-family: 'DM Sans', sans-serif;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: border-color 0.2s; display: flex; align-items: center; gap: 4px;
}
.country-picker-btn:hover { border-color: var(--rose-mid); }
.country-dropdown {
  position: absolute; bottom: 100%; left: 0; z-index: 999;
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; box-shadow: 0 4px 20px rgba(42,35,32,0.12);
  width: 240px; overflow: hidden;
  margin-bottom: 6px;
}
.country-search {
  width: 100%; padding: 10px 14px; border: none; border-bottom: 1px solid var(--border);
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  background: var(--cream); color: var(--dark); outline: none;
}
.country-list {
  max-height: 200px; overflow-y: auto;
}
.country-option {
  padding: 8px 14px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; color: var(--dark);
}
.country-option:hover { background: var(--rose-light); }
.country-option.selected { font-weight: 500; color: var(--rose); }
.country-option .co-flag { font-size: 16px; flex-shrink: 0; }
.country-option .co-name { flex: 1; }
.country-option .co-code { font-size: 11px; color: var(--stone); }
.country-list::-webkit-scrollbar { width: 4px; }
.country-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.phone-input-wrapper { position: relative; display: flex; gap: 6px; align-items: center; flex: 1; }
.phone-number-input {
  flex: 1; font-size: 13px; padding: 7px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--cream); color: var(--dark);
  font-family: 'DM Sans', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.phone-number-input:focus { border-color: var(--rose-mid); }
.phone-number-input.error { border-color: #c0504a; background: #fdf0ee; }
.phone-send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--rose); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: background 0.2s; flex-shrink: 0;
}
.phone-send-btn:hover { background: #b5635a; }
.phone-error { font-size: 11px; color: #c0504a; padding: 3px 14px 0; }
.dc-info { flex: 1; }
.dc-name { font-size: 13px; font-weight: 500; color: var(--dark); font-family: 'Cormorant Garamond', serif; font-size: 14px; }
.dc-detail { font-size: 11px; color: var(--stone); margin-top: 2px; font-weight: 300; }

/* SCROLLBAR */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 500px) {
  .site-header { padding: 12px 14px; gap: 10px; }
  .logo-mark { width: 36px; height: 36px; font-size: 15px; }
  .logo-text h1 { font-size: 14px; }
  .logo-text p { font-size: 10px; }
  .header-address { display: none; }
  .main { padding: 12px 0 40px; }
  .phone-frame { border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
  .messages { max-height: calc(100dvh - 320px); min-height: 200px; }
  .bubble { font-size: 14px; padding: 9px 13px; }
  .chip { font-size: 13px; padding: 8px 14px; }
  .doctor-card-btn { padding: 11px 12px; }
  .dc-name { font-size: 14px; }
  .dc-detail { font-size: 12px; }
  .slot-time { font-size: 16px; }
  .txt-input, .phone-number-input { font-size: 16px; } /* prevents iOS zoom */
  .country-search { font-size: 16px; }
  .country-dropdown { width: 100%; left: 0; right: 0; }
  .portal-footer { display: none; }
  .chat-header { padding: 10px 14px; }
  .chat-name { font-size: 14px; }
  .vtab { font-size: 12px; padding: 9px 4px; }
  .doc-panel { max-height: calc(100dvh - 220px); }
  .confirm-box { font-size: 13px; }
  .input-row { padding: 8px 10px; }
}

@media (min-width: 501px) {
  .main { padding: 24px 16px 60px; }
}

/* Prevent iOS bounce scroll on body, allow inner scroll */
html { height: 100%; }
body { height: 100%; overflow-x: hidden; }
@media (max-width: 500px) { /* body overflow managed per breakpoint */ }
.messages { -webkit-overflow-scrolling: touch; }
.country-list { -webkit-overflow-scrolling: touch; }
.doc-panel { -webkit-overflow-scrolling: touch; }

</style>
</head>

<script>
// ─── DATA ───────────────────────────────────────────────────────
// ─── SCHEDULE ENGINE ─────────────────────────────────────────────
// Ordinationszeiten: { weekday(0=So,1=Mo...): [startH, endH] }
const SCHEDULE = {
  michael: {
    workdays: { 2:[14,19], 3:[14,19] },
    slotMin: 15,
    absences: [],
  },
  etelka: {
    workdays: { 1:[11,18], 4:[11,18] },
    slotMin: 15,
    absences: [],
  },
};

// Slot-Typen: Dauer in Minuten – von der Ordination im Backend anpassbar
const SLOT_TYPES = {
  standard:      { min: 15, label_de: 'Standardtermin',        label_hu: 'Általános időpont' },
  erstbesuch:    { min: 30, label_de: 'Erstbesuch',             label_hu: 'Első látogatás' },
  schwangerschaft:{ min:30, label_de: 'Schwangerschaft',        label_hu: 'Terhesség' },
  ultraschall:   { min: 30, label_de: 'Ultraschall',            label_hu: 'Ultrahang' },
  spirale:       { min: 30, label_de: 'Spirale / Verhütung',    label_hu: 'Spirál / Fogamzásgátlás' },
  kinderwunsch:  { min: 30, label_de: 'Kinderwunsch',           label_hu: 'Gyermekvállalás' },
  beschwerden:   { min: 30, label_de: 'Starke Beschwerden',     label_hu: 'Erős panaszok' },
  rezept:        { min: 15, label_de: 'Rezept',                 label_hu: 'Recept' },
  befund:        { min: 15, label_de: 'Befund',                 label_hu: 'Lelet' },
};

// Map Anliegen → Slot-Typ
function getSlotType(reason) {
  const r = (reason || '').toLowerCase();
  if (r.includes('schwanger'))  return 'schwangerschaft';
  if (r.includes('ultraschall'))return 'ultraschall';
  if (r.includes('spirale') || r.includes('verhütung')) return 'spirale';
  if (r.includes('kinderwunsch') || r.includes('babywunsch')) return 'kinderwunsch';
  if (r.includes('erstbesuch'))  return 'erstbesuch';
  if (r.includes('stark') || r.includes('beschwerden')) return 'beschwerden';
  if (r.includes('rezept'))      return 'rezept';
  if (r.includes('befund'))      return 'befund';
  return 'standard';
}

// Bereits gebuchte Slots (in echter App: vom Server laden)
const BOOKED = new Set(); // Format: "michael|2025-05-27|14:30"

function isAbsent(drKey, dateObj) {
  const iso = dateObj.toISOString().slice(0,10);
  return SCHEDULE[drKey].absences.some(([from,to]) => iso >= from && iso <= to);
}

// Number of priority slots reserved per day for private patients
const PRIVATE_PRIORITY_SLOTS = 2;

function generateSlots(drKey, dateObj, slotDuration=15) {
  const wd = dateObj.getDay();
  const sched = SCHEDULE[drKey].workdays[wd];
  if (!sched) return [];
  if (isAbsent(drKey, dateObj)) return [];
  const [startH, endH] = sched;
  const slots = [];
  const totalMin = (endH - startH) * 60;

  // Check if patient is private (gets priority access)
  const isPrivate = S.insurance === 'privat';
  // Priority slots released 24h before appointment
  const hoursUntilDay = (dateObj - new Date()) / 3600000;
  const priorityReleased = hoursUntilDay <= 24;

  let slotIndex = 0;
  for (let m = 0; m < totalMin; m += slotDuration) {
    const absMin = startH * 60 + m;
    const h = Math.floor(absMin / 60);
    const mn = absMin % 60;
    if (h >= endH) break;
    const timeStr = h.toString().padStart(2,'0') + ':' + mn.toString().padStart(2,'0');
    const key = drKey + '|' + dateObj.toISOString().slice(0,10) + '|' + timeStr;
    if (BOOKED.has(key)) { slotIndex++; continue; }

    // Priority slot logic: first N slots reserved for private patients
    const isPrioritySlot = slotIndex < PRIVATE_PRIORITY_SLOTS;
    if (isPrioritySlot && !isPrivate && !priorityReleased) {
      slotIndex++;
      continue; // Hide this slot for non-private patients
    }

    slots.push({
      drKey, date: dateObj, timeStr, key, slotDuration,
      isPriority: isPrioritySlot && isPrivate // Mark as priority for display
    });
    slotIndex++;
  }
  return slots;
}

// Pick one morning (≤12:30), one afternoon (13–17), one evening (≥17:30)
function pickBalanced(slots) {
  const morn  = slots.filter(s => parseInt(s.timeStr) < 13);
  const aft   = slots.filter(s => parseInt(s.timeStr) >= 13 && parseInt(s.timeStr) < 17);
  const eve   = slots.filter(s => parseInt(s.timeStr) >= 17);
  const pick  = [];
  if (morn.length) pick.push(morn[0]);
  if (aft.length)  pick.push(aft[0]);
  if (eve.length)  pick.push(eve[0]);
  return pick;
}

function getSlotsForDoctor(drKey, startDate, count=3, slotDuration=15) {
  const results = [];
  const d = new Date(startDate);
  d.setHours(0,0,0,0);
  let tries = 0;
  while (results.length < count && tries < 60) {
    const daySlots = generateSlots(drKey, new Date(d), slotDuration);
    const picked   = pickBalanced(daySlots);
    picked.forEach(s => { if (results.length < count) results.push(s); });
    d.setDate(d.getDate() + 1);
    tries++;
  }
  return results;
}

function getSlotsForAny(startDate, count=3, slotDuration=15) {
  const allSlots = [];
  const d = new Date(startDate);
  d.setHours(0,0,0,0);
  let tries = 0;
  while (allSlots.length < count && tries < 60) {
    ['michael','etelka'].forEach(drKey => {
      const daySlots = generateSlots(drKey, new Date(d), slotDuration);
      daySlots.forEach(s => allSlots.push(s));
    });
    d.setDate(d.getDate() + 1);
    tries++;
    const picked = pickBalanced(allSlots);
    if (picked.length >= count) return picked.slice(0, count);
  }
  return pickBalanced(allSlots).slice(0, count);
}

function formatSlotLabel(slot) {
  const days_de = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const days_hu = ['V','H','K','Sze','Cs','P','Szo'];
  const days_en = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const d  = slot.date;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  if (lang === 'de') return `${days_de[d.getDay()]}, ${dd}.${mm}.`;
  if (lang === 'hu') return `${days_hu[d.getDay()]} ${mm}.${dd}.`;
  return `${days_en[d.getDay()]}, ${mm}/${dd}`;
}

// ─── SECURITY LAYER ─────────────────────────────────────────────
const SECURITY = {
  sessionToken: null,
  sessionStart: null,
  kiCallCount: 0,
  maxKiCalls: 12,
  blocked: false,
  phoneRegistry: {}, // phone → {count, first}
  maxPerPhone: 3,
  minInputMs: 2800,   // min ms between page load and first submission (bot check)
  pageLoadTime: Date.now(),
  honeypotFilled: false,
};

function secGenToken() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function secGetApiKey() {
  return sessionStorage.getItem('nr_apikey') || '';
}
function secSetApiKey(key) {
  sessionStorage.setItem('nr_apikey', key.trim());
}

function secInit() {
  SECURITY.sessionToken = secGenToken();
  SECURITY.sessionStart = Date.now();
  SECURITY.kiCallCount = 0;
  SECURITY.blocked = false;
  // Load phone registry from sessionStorage (persists within tab, not across)
  try {
    const stored = sessionStorage.getItem('nr_phones');
    if (stored) {
      const parsed = JSON.parse(stored);
      // Clean entries older than 24h
      const now = Date.now();
      Object.keys(parsed).forEach(k => {
        if (now - parsed[k].first > 86400000) delete parsed[k];
      });
      Object.assign(SECURITY.phoneRegistry, parsed);
    }
  } catch(e) {}
}

function secSavePhones() {
  try { sessionStorage.setItem('nr_phones', JSON.stringify(SECURITY.phoneRegistry)); } catch(e) {}
}

function secCheckPhone(phone) {
  const key = phone.replace(/\s/g,'');
  const now = Date.now();
  const entry = SECURITY.phoneRegistry[key];
  if (!entry) {
    SECURITY.phoneRegistry[key] = { count: 1, first: now };
    secSavePhones();
    return { ok: true };
  }
  // Reset if >24h
  if (now - entry.first > 86400000) {
    SECURITY.phoneRegistry[key] = { count: 1, first: now };
    secSavePhones();
    return { ok: true };
  }
  if (entry.count >= SECURITY.maxPerPhone) {
    return { ok: false, reason: 'limit' };
  }
  entry.count++;
  secSavePhones();
  return { ok: true };
}

function secCheckKI() {
  if (SECURITY.blocked) return false;
  if (SECURITY.kiCallCount >= SECURITY.maxKiCalls) {
    SECURITY.blocked = true;
    return false;
  }
  SECURITY.kiCallCount++;
  return true;
}

function secCheckTiming() {
  return (Date.now() - SECURITY.pageLoadTime) >= SECURITY.minInputMs;
}

function secShowBlocked(reason) {
  const banner = document.getElementById('sec-banner');
  if (banner) {
    banner.style.display = 'block';
    banner.textContent = lang === 'de'

function nowStr() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMsg(html, who) {
  const el = document.createElement('div');
  el.className = 'msg ' + who;
  const safeHtml = (html == null ? '' : String(html));
  el.innerHTML = `<div class="bubble">${safeHtml.replace(/\n/g,'<br>')}</div><div class="msg-time">${nowStr()}</div>`;
  msgsEl().appendChild(el);
  msgsEl().scrollTop = 9999;
}

let typEl = null;
function showTyping() {
  typEl = document.createElement('div');
  typEl.className = 'msg bot';
  typEl.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgsEl().appendChild(typEl);
  msgsEl().scrollTop = 9999;
}
function removeTyping() { if (typEl) { typEl.remove(); typEl = null; } }
function bot(text, delay=700) {
  return new Promise(r => { showTyping(); setTimeout(() => { removeTyping(); addMsg(text,'bot'); r(); }, delay); });
}

function clearAll() {
  document.getElementById('chips-area').style.display = 'none';
  document.getElementById('chips-area').innerHTML = '';
  document.getElementById('slot-area').style.display = 'none';
  document.getElementById('slot-area').innerHTML = '';
  document.getElementById('doctor-cards-area').style.display = 'none';
  document.getElementById('doctor-cards-area').innerHTML = '';

}

function setChips(items, fn, extraClass) {
  clearAll();
  const area = document.getElementById('chips-area');
  area.style.display = 'flex';
  items.forEach((item, i) => {
    const b = document.createElement('button');
    b.className = 'chip' + (item === tx().reasons[5] ? ' emergency' : extraClass ? ' ' + extraClass : '');
    b.textContent = item;
    b.onclick = () => { clearAll(); fn(item, i); };
    area.appendChild(b);
  });
}

function setInput(ph, handler) {
  document.getElementById('txt').placeholder = ph || '';
  S.handler = handler;
}

function doSend() {
  const el = document.getElementById('txt');
  const val = el.value.trim();
  if (!val) return;
  el.value = '';
  addMsg(val, 'user');
  if (S.handler) { const h = S.handler; S.handler = null; h(val); }
}

function validatePhoneNumber(dialCode, number) {
  const digits = number.replace(/[\s\-\(\)]/g, '');
  if (!/^\d+$/.test(digits)) return { ok: false, reason: 'nur_ziffern' };
  const country = COUNTRIES.find(c => c.code === dialCode);
  if (!country) return { ok: true, full: dialCode + digits };
  const len = digits.startsWith('0') ? digits.length - 1 : digits.length;
  const inRange = country.digits.some(d => Math.abs(len - d) <= 1);
  if (!inRange) return { ok: false, reason: 'laenge', expected: country.digits[0] };
  const cleaned = digits.startsWith('0') ? digits.slice(1) : digits;
  return { ok: true, full: dialCode + ' ' + cleaned };
}

function isValidEmailAddress(str) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(str.trim());
}

function showPhoneInput(onConfirmed) {
  const irow = document.getElementById('input-row');

  searchInput.className = 'country-search';
  searchInput.placeholder = lang === 'de' ? 'Land suchen …' : lang === 'hu' ? 'Ország keresése …' : 'Search country …';
  searchInput.autocomplete = 'off';

  const listEl = document.createElement('div');
  listEl.className = 'country-list';

  function renderList(filter) {
    listEl.innerHTML = '';
    const q = (filter || '').toLowerCase();
    COUNTRIES.filter(c => !q || c.name.toLowerCase().includes(q) || c.code.includes(q)).forEach(c => {
      const opt = document.createElement('div');
      opt.className = 'country-option' + (c === selectedCountry ? ' selected' : '');
      opt.innerHTML = `<span class="co-flag">${c.flag}</span><span class="co-name">${c.name}</span><span class="co-code">${c.code}</span>`;
      opt.onclick = (e) => {
        e.stopPropagation();
        selectedCountry = c;
        pickerBtn.innerHTML = `<span>${c.flag}</span><span>${c.code}</span>`;
        closeDropdown();
        numInput.focus();
      };
      listEl.appendChild(opt);
    });
  }

  function openDropdown() {
    dropdown.style.display = 'block';
    dropdownOpen = true;
    searchInput.value = '';
    renderList('');
    setTimeout(() => searchInput.focus(), 50);
  }
  function closeDropdown() {
    dropdown.style.display = 'none';
    dropdownOpen = false;
  }

  searchInput.addEventListener('input', () => renderList(searchInput.value));
  searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeDropdown(); });
  pickerBtn.onclick = (e) => { e.stopPropagation(); dropdownOpen ? closeDropdown() : openDropdown(); };
  document.addEventListener('click', () => { if (dropdownOpen) closeDropdown(); }, { once: false });

  dropdown.appendChild(searchInput);
  dropdown.appendChild(listEl);

  // Phone number input
  const numInput = document.createElement('input');
  numInput.className = 'phone-number-input';
  numInput.type = 'tel';
  numInput.placeholder = '664 123 4567';
  numInput.inputMode = 'tel';

  const errorEl = document.createElement('div');
  errorEl.className = 'phone-error';
  errorEl.style.display = 'none';

  const btn = document.createElement('button');
  btn.className = 'phone-send-btn';
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';

  function tryConfirm() {
    const raw = numInput.value.trim();
    if (!raw) { showError(lang === 'de' ? 'Bitte Nummer eingeben.' : lang === 'hu' ? 'Kérjük adja meg a számát.' : 'Please enter your phone number.'); return; }
    const result = validatePhoneNumber(selectedCountry.code, raw);
    if (!result.ok) {
      if (result.reason === 'nur_ziffern') {
        showError(lang === 'de' ? 'Nur Ziffern erlaubt – keine Buchstaben.' : lang === 'hu' ? 'Csak számjegyek engedélyezettek.' : 'Numbers only – no letters allowed.');
      } else {
        showError(lang === 'de' ? `Bitte prüfen Sie die Nummer (ca. ${result.expected} Stellen).` : lang === 'hu' ? `Kérjük ellenőrizze a számot (kb. ${result.expected} jegy).` : `Please check the number (approx. ${result.expected} digits).`);
      }
      numInput.classList.add('error');
      return;
    }
    numInput.classList.remove('error');
    errorEl.style.display = 'none';
    restoreInputRow();
    onConfirmed(result.full);
  }

  function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
  numInput.addEventListener('input', () => { numInput.classList.remove('error'); errorEl.style.display = 'none'; });
  numInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryConfirm(); });
  btn.onclick = tryConfirm;

  row.appendChild(pickerBtn);
  row.appendChild(numInput);
  row.appendChild(btn);
  outer.appendChild(dropdown);
  outer.appendChild(row);
  outer.appendChild(errorEl);
  irow.appendChild(outer);
  renderList('');
  setTimeout(() => numInput.focus(), 100);
}

  });

  // "None of these" button if not last round
  if (round < MAX_SLOT_ROUNDS) {
    const chips = document.getElementById('chips-area');
    chips.style.display = 'flex';
    chips.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = lang === 'de' ? 'Keiner passt – weitere Termine' : lang === 'hu' ? 'Egyik sem jó – további időpontok' : 'None suitable – more options';
    btn.onclick = () => {
      // Next round starts after last shown slot
      const lastDate = new Date(slots[slots.length-1].date);
      lastDate.setDate(lastDate.getDate() + 1);
      clearAll();
      addMsg(btn.textContent, 'user');
      showSlots(drKey, round+1, lastDate);
    };
    chips.appendChild(btn);
  } else {
    // Last round – after this, give up
    const chips = document.getElementById('chips-area');
    chips.style.display = 'flex';
    chips.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = lang === 'de' ? 'Keiner passt – ich rufe an' : lang === 'hu' ? 'Egyik sem megfelelő – inkább hívok' : 'None suitable – I will call';
    btn.onclick = async () => {
      clearAll();
      addMsg(btn.textContent, 'user');
      await bot(lang === 'de'
        ? 'Kein Problem! Rufen Sie uns gerne direkt an:\n+43 1 470 65 59\n\nMo & Do 11–18 Uhr · Di & Mi 14–19 Uhr'
        : lang === 'hu'
        ? 'Rendben! Kérjük hívjon minket:\n+43 1 470 65 59\n\nH & Cs 11–18 · K & Sze 14–19'
        : 'No problem! Please call us directly:\n+43 1 470 65 59\n\nMon & Thu 11–18 · Tue & Wed 14–19', 700);
      await doAnother();
    };
    chips.appendChild(btn);
  }
}

async function triageSymptoms(symptoms) {
  // Lokale Vorprüfung: eindeutig gynäkologische Begriffe → sofort zurückgeben ohne KI-Aufruf
  const s = symptoms.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const definiteGyne = ['ausfluss','scheide','vagina','vulva','menstruation','periode','regelschmerz',
    'unterleib','gebarmutt','eierstock','endometriose','myom','zyste','hpv','kondylom',
    'wechseljahr','verhutung','verhütung','schwanger','kinderwunsch','stillen',
    'brust','mamm','pms','inkontinenz','beckenbod','stink','übelriech','ubelriech',
    'weissfluss','weißfluss','juckreiz vagina','scheidenentz','pilz','candida',
    'geschlechtskrankheit','std','gonorrhoe','chlamydi','intim','genital','schamlippe','klitoris'];
  if (definiteGyne.some(k => s.includes(k))) {
    return { isGynecology:true, confidence:'high', explanation:'Diese Beschwerden fallen in das Fachgebiet Gynäkologie.', recommendedSpecialty:null };
  }

  // Eindeutig NICHT gynäkologisch → sofort zurückgeben
  const definiteOther = [
    {k:['zahn','kiefer','gebiss','zahnfleisch'], sp:'Zahnheilkunde'},
    {k:['knie','hufte','wirbel','bandscheib','gelenk','orthop','fraktur','knochen'], sp:'Orthopädie'},
    {k:['herzrasen','herzstolpern','herzinfarkt','blutdruck'], sp:'Kardiologie'},
    {k:['ohrenschmerz','tinnitus','schwindel ohr','hörverlust'], sp:'HNO'},
    {k:['sehverlust','augenschmerz','bindehaut'], sp:'Augenheilkunde'},
  ];
  for (const {k, sp} of definiteOther) {
    if (k.some(kw => s.includes(kw))) {
      return { isGynecology:false, confidence:'high', explanation:'Für diese Beschwerden ist '+sp+' zuständig.', recommendedSpecialty:sp };
    }
  }

  const prompt = `Du bist ein medizinischer Triage-Assistent für eine gynäkologische Ordination in Wien.
Analysiere folgende Beschwerde und antworte NUR mit einem JSON-Objekt (kein Text davor oder danach):
{"isGynecology":true/false/null,"confidence":"high"/"medium"/"low","explanation":"1 kurzer Satz auf Deutsch","recommendedSpecialty":"Fachrichtung oder null"}

Beschwerde: ${symptoms}

GEHÖRT ZUR GYNÄKOLOGIE (isGynecology: true):
- Vaginaler Ausfluss jeder Art (übelriechend, verfärbt, ungewöhnlich, vermehrt)
- Menstruationsprobleme (Schmerzen, unregelmäßig, ausbleibend, Zwischenblutungen)
- Unterleibsschmerzen, Beckenschmerzen
- Schwangerschaft, Verhütung, Kinderwunsch, Unfruchtbarkeit
- Wechseljahresbeschwerden, Hitzewallungen
- Brust (Schmerzen, Knoten, Absonderungen)
- Vulva/Vagina (Jucken, Brennen, Schmerzen, Schwellung)
- Endometriose, Myome, Zysten
- Gebärmutterhals, Zervix, Pap-Abstrich
- Harnwegsinfekte bei Frauen (häufig gynäkologisch bedingt)
- Sexuell übertragbare Infektionen (STI/STD)
- HPV, Kondylome
- Pilzinfektionen im Genitalbereich
- Beckenbodenschwäche, Inkontinenz
- Prämenstruelles Syndrom (PMS)

NICHT GYNÄKOLOGIE (isGynecology: false):
- Zähne → Zahnheilkunde
- Rücken, Knie, Fuß, Gelenke → Orthopädie
- Haut, Ausschlag (außer Genitalbereich) → Dermatologie
- Herz, Blutdruck → Kardiologie
- Ohren, Nase, Hals → HNO
- Augen → Augenheilkunde
- Kopfschmerzen, Migräne, Neurologie
- Magen-Darm (außer wenn mit Unterleib kombiniert) → Gastroenterologie
- Lungenprobleme → Pneumologie

BEI UNKLARHEIT: Lieber isGynecology: true setzen – die Ordination klärt es.
Antworte NUR mit dem JSON, kein anderer Text.`;
  try {
    if (!secCheckKI()) { secShowBlocked('ki'); throw new Error('rate limit'); }
    const resp = await fetch(BACKEND_URL + '/ai/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await resp.json();
    const raw = data.text || '{}';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    const nonGyne = ['Zahn','Orthop','Chirurg','Kardio','Neuro','Haut','Derma','HNO','Auge','Urol','Psychiatr','Lunge','Magen','Darm','Pädiat','Kiefer'];
    if (parsed.recommendedSpecialty && nonGyne.some(k => parsed.recommendedSpecialty.includes(k))) parsed.isGynecology = false;
    // Override: wenn KI "Allgemeinmedizin" sagt aber Beschwerde gynäkologisch klingt → korrigieren
    const gyneKeywords = ['ausfluss','scheide','vagina','vulva','menstruation','periode','unterleib','gebärmutter','eierstock','brust','wechseljahr','schwanger','verhütung','pilz','jucken','brennen','geruch','stink','riech','übelriech','endometriose','myom','zyste','hpv','inkontinenz','weißfluss','weissfluss','scheiden'];
    const sympLower = symptoms.toLowerCase();
    if ((parsed.recommendedSpecialty === 'Allgemeinmedizin' || parsed.recommendedSpecialty === 'Hausarzt / Allgemeinmedizin' || !parsed.recommendedSpecialty) && gyneKeywords.some(k => sympLower.includes(k))) {
      parsed.isGynecology = true;
      parsed.recommendedSpecialty = null;
      parsed.confidence = 'high';
    }
    return parsed;
  } catch(e) {
    const s = symptoms.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    if (/fuss?s*|zeh|knie|hufte|rucken|gelenk|knochen|schulter|sport|verstauchung|bruch|bandscheib/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Für diese Beschwerden ist Orthopädie die passende Fachrichtung.', recommendedSpecialty:'Orthopädie und Traumatologie' };
    if (/zahn|kiefer|zahne|zahnfleisch|gebiss/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Für Zahnbeschwerden ist ein Zahnarzt zuständig.', recommendedSpecialty:'Zahnheilkunde' };
    if (/haut|ausschlag|ekzem|akne|juckreiz|pickel/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Hautbeschwerden werden von der Dermatologie behandelt.', recommendedSpecialty:'Dermatologie' };
    if (/ohr|nase|hals|schlucken|tinnitus/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Für diese Beschwerden ist die HNO zuständig.', recommendedSpecialty:'HNO (Hals-Nasen-Ohren-Heilkunde)' };
    if (/herz|blutdruck|herzrasen/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Herzbeschwerden gehören zur Kardiologie.', recommendedSpecialty:'Kardiologie' };
    if (/kopfschmerz|migrane|schwindel|taubheit/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Diese Beschwerden gehören zur Neurologie.', recommendedSpecialty:'Neurologie' };
    if (/auge|sehen|brille/.test(s))
      return { isGynecology:false, confidence:'high', explanation:'Augenbeschwerden werden von der Augenheilkunde behandelt.', recommendedSpecialty:'Augenheilkunde' };
    if (/menstruation|periode|unterleib|vagina|zyklus|schwanger|verhutung|wechseljahr|ausfluss|jucken|brennen|scheide|vulva|brust|endometriose|myom|zyste|pms|inkontinenz|hpv|pilz|infektion|geruch|riecht|stinkt|stinkend|übelriechend|ubelriechend|weissfluss|weißfluss|scheiden/.test(s))
      return { isGynecology:true, confidence:'high', explanation:'Diese Beschwerden gehören zur Gynäkologie.', recommendedSpecialty:null };
    return { isGynecology:null, unclear:true };
  }
}


async function handleSymptoms() {
  await bot(tx().symptomsAsk, 600);
  setInput(tx().ph.free, async (symptoms) => {
    addMsg(tx().kiChecking, 'bot');
    showTyping();
    let triage;
    try { triage = await triageSymptoms(symptoms); }
    catch(e) { triage = { isGynecology: null, unclear: true }; }
    removeTyping();
    msgsEl().lastElementChild?.remove();

    const sendRequest = async (reason, detail) => {
      try {
        await fetch(BACKEND_URL + '/confirm-request', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: S.name, phone: S.phone, email: S.email, reason, detail })
        });
      } catch(e) { console.warn('confirm-request:', e); }
    };

    if (!triage || triage.isGynecology === null || triage.unclear) {
      await bot(lang === 'de'
        ? 'Ich konnte Ihr Anliegen leider nicht zuordnen. Ich leite es an die Ordination weiter und Sie erhalten eine Rückmeldung per ' + contactChannel() + '.'
        : lang === 'hu'
        ? 'Sajnos nem tudtam besorolni a panaszát. Továbbítom a rendelőnek, és visszajelzést kap ' + contactChannel() + '-ban.'
        : 'I was unable to classify your concern. I have forwarded it to the practice and you will receive a response by ' + contactChannel() + '.', 800);
      await sendRequest('Anliegen – unklar', symptoms);
      logEntry('Beschwerden – unklar', symptoms, null, null);
      await doAnother();
      return;
    }

    if (triage.isGynecology) {
      await bot(tx().symptomsRight(triage.explanation || ''), 750);
      setChips([tx().symptomsYesAppointment, tx().symptomsNoThanks], async (item, i) => {
        addMsg(item, 'user');
        if (i === 0) {
          logEntry('Beschwerden -> Termin', symptoms, null, S.doctor !== 'egal' ? DOCTORS[S.doctor] : null);
          await bot(tx().slotIntro(S.doctor && S.doctor !== 'egal' ? DOCTORS[S.doctor].name : 'Dr. Neumann', 'beschwerden'), 600);
          showSlots(S.doctor || 'egal', 1, null, 'beschwerden');
        } else {
          await sendRequest('Anliegen geschildert', symptoms);
          logEntry('Beschwerden geschildert', symptoms, null, null);
          await doAnother();
        }
      });
    } else {
      const specialty = triage.recommendedSpecialty || 'Hausarzt / Allgemeinmedizin';
      const partner   = PARTNER_DOCTORS[specialty] || null;
      if (partner) {
        // Check insurance compatibility
        const patientIns = S.insurance || '';
        const partnerIns = partner.insurance_types || [];
        const insMap = { oegk:'ÖGK', svs:'SVS', bvaeb:'BVAEB', kfa:'KFA', zusatz:'Zusatzversicherung', privat:'Privat' };
        const patientInsLabel = insMap[patientIns] || patientIns;
        const insAccepted = partnerIns.length === 0 || partnerIns.includes(patientInsLabel);
        const insWarning = !insAccepted && patientIns && patientIns !== 'privat'
          ? (lang==='de' ? `\n\n⚠️ Hinweis: Dieser Arzt nimmt die ${patientInsLabel} möglicherweise nicht. Bitte vor dem Termin nachfragen – es könnte eine Privatrechnung entstehen.`
            : lang==='hu' ? `\n\n⚠️ Megjegyzés: Ez az orvos esetleg nem fogadja a ${patientInsLabel} biztosítást. Kérjük érdeklődjön előre.`
            : `\n\n⚠️ Note: This doctor may not accept ${patientInsLabel}. Please check before your appointment – private fees may apply.`)
          : '';

        await bot(tx().symptomsWrong(specialty, partner.name, (triage.explanation || '') + insWarning), 800);
        await bot(tx().symptomsPartnerInfo(partner.name, partner.address, partner.tel), 700);
        await bot(tx().symptomsConsentAsk, 700);
        setChips([tx().symptomsConsentYes, tx().symptomsConsentNo], async (item, i) => {
          addMsg(item, 'user');
          if (i === 0) {
            await sendRequest('Weiterleitung: ' + partner.name, symptoms);
            logEntry('Weiterleitung: ' + partner.name, symptoms, null, null);
            await bot(tx().symptomsConsentDone(), 600);
          } else {
            await bot(tx().symptomsConsentDeclined, 600);
          }
          await doAnother();
        });
      } else {
        await bot(tx().symptomsWrongNoPartner(specialty, triage.explanation || ''), 800);
        await sendRequest('Anliegen -> ' + specialty, symptoms);
        logEntry('Beschwerden -> ' + specialty, symptoms, null, null);
        await doAnother();
      }
    }
  });
}

async function validateMedication(input) {
  const apiKey = secGetApiKey();
  const hdrs = { 'Content-Type': 'application/json' };
  if (apiKey) hdrs['x-api-key'] = apiKey;
  try {
    const medPrompt = 'Ist "' + input + '" ein bekanntes österreichisches Arzneimittel? Antworte NUR mit JSON: {"valid":true/false,"canonical":"korrekter Name","suggestion":"Korrekturvorschlag falls Tippfehler oder null","wirkstoff":"Wirkstoff oder null"}';
    const resp = await fetch(BACKEND_URL + '/ai/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: medPrompt })
    });
    const data = await resp.json();
    const raw = data.text || '{}';
    return JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch(e) {
    return { valid: true, canonical: input, suggestion: null, wirkstoff: null };
  }
}

async function handleReason(reason, idx) {
  addMsg(reason, 'user');
  document.getElementById('confirm-area').innerHTML = '';
  document.getElementById('confirm-area').style.display = 'none';
  const drObj = S.doctor && S.doctor !== 'egal' ? DOCTORS[S.doctor] : null;

  if (idx === 0) {
    // Termin vereinbaren – ask what kind first
    await bot(lang === 'de'
      ? 'Um was für einen Termin handelt es sich?'
      : lang === 'hu' ? 'Milyen jellegű az időpont?'
      : 'What type of appointment is this?', 600);
    const apptTypes = lang === 'de'
      ? ['Erstbesuch','Routineuntersuchung / Kontrolle','Ultraschall','Spirale einsetzen/entfernen','Sonstiger Termin']
      : lang === 'hu'
      ? ['Első látogatás','Rutinvizsgálat / Ellenőrzés','Ultrahang','Spirál behelyezés/eltávolítás','Egyéb időpont']
      : ['First visit','Routine check-up / follow-up','Ultrasound','Coil insertion/removal','Other appointment'];
    const typeKeys = ['erstbesuch','standard','ultraschall','spirale','standard'];
    setChips(apptTypes, async (item, i) => {
      addMsg(item, 'user');
      await showSlotsForReason(reason, typeKeys[i]);
    });

  } else if (idx === 1) {
    // Schwangerschaft
    await bot(tx().schwangerschaftMsg, 600);
    await showSlotsForReason(reason, 'schwangerschaft');

  } else if (idx === 2) {
    // Kinderwunsch
    await bot(tx().kinderwunschMsg, 600);
    await showSlotsForReason(reason, 'kinderwunsch');

  } else if (idx === 3) {
    // Rezept
    await handlePrescription();

  } else if (idx === 4) {
    // Befund
    await bot(tx().reportDone(), 600);
    logEntry(reason, '', null, drObj);
    // Send to backend
    try {
      await fetch(BACKEND_URL + '/confirm-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: S.name, phone: S.phone, email: S.email, reason: 'Befund abholen', detail: '' })
      });
    } catch(e) { console.warn('confirm-request:', e); }
    await doAnother();

  } else if (idx === 5) {
    // Anliegen schildern
    await handleSymptoms();

  } else if (idx === 6) {
    // Frage / Sonstiges
    await bot(tx().questionAsk, 600);
    setInput(tx().ph.free, async (val) => {
      await bot(tx().questionDone(), 600);
      logEntry(reason, val, null, drObj);
      try {
        await fetch(BACKEND_URL + '/confirm-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: S.name, phone: S.phone, email: S.email, reason: 'Frage / Sonstiges', detail: val })
        });
      } catch(e) { console.warn('confirm-request:', e); }
      await doAnother();
    });

  } else if (idx === 7) {
    // Notfall
    await bot(tx().emergency, 500);
    logEntry(reason, '', null, null);
    try {
      await fetch(BACKEND_URL + '/confirm-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: S.name, phone: S.phone, email: S.email, reason: 'NOTFALL', detail: 'Patient hat Notfall gemeldet' })
      });
    } catch(e) { console.warn('confirm-request:', e); }
    await doAnother();

  } else if (idx === 8) {
    // Termin absagen
    await handleCancellation();
  }
}

const PATIENTS_KEY = 'nr_patients';

// ── Session Abandonment Tracking ─────────────────────────────
let _abandonTimer   = null;
const ABANDON_MS    = 5 * 60 * 1000; // 5 Minuten Inaktivität

function resetAbandonTimer() {
  if (_abandonTimer) clearTimeout(_abandonTimer);
  // Only track if we have at least a phone number
  if (!S || !S.phone) return;
  _abandonTimer = setTimeout(async () => {
    // Check if session is still incomplete (no appointment booked, no request sent)
    if (!S.phone || S.log.length > 0) return; // Already completed something
    try {
      await fetch(BACKEND_URL + '/confirm-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:   S.name  || '(unbekannt)',
          phone:  S.phone,
          email:  S.email || '',
          reason: 'Unvollständige Anfrage',
          detail: 'Patient hat das Portal geöffnet aber keinen Termin abgeschlossen. Letzter bekannter Schritt: ' +
                  (S.doctor ? 'Arzt gewählt: ' + (S.doctor === 'egal' ? 'Keine Präferenz' : S.doctor) : 'vor Arztauswahl') +
                  (S.insurance ? ' · Versicherung: ' + (S.insuranceLabel || S.insurance) : '')
        })
      });
      console.log('📋 Unvollständige Anfrage gesendet für', S.phone);
    } catch(e) { /* silent */ }
  }, ABANDON_MS);
}

// ── Patient DB via Backend ───────────────────────────────────
async function savePatient(phone, data) {
  try {
    await fetch(BACKEND_URL + '/patient/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, ...data })
    });
    // Also cache locally as fallback
    const cache = JSON.parse(sessionStorage.getItem(PATIENTS_KEY) || '{}');
    cache[phone.replace(/\s/g,'')] = { ...data, updatedAt: Date.now() };
    sessionStorage.setItem(PATIENTS_KEY, JSON.stringify(cache));
  } catch(e) { console.warn('savePatient error:', e); }
}

async function findPatient(phone) {
  const key = phone.replace(/\s/g, '');
  try {
    // First check local cache
    const cache = JSON.parse(sessionStorage.getItem(PATIENTS_KEY) || '{}');
    if (cache[key]) return { match: 'exact', patient: cache[key] };

    // Check fuzzy in cache
    for (const k of Object.keys(cache)) {
      if (k.length === key.length && k.slice(0,-2) === key.slice(0,-2)) {
        return { match: 'fuzzy', storedPhone: k, patient: cache[k] };
      }
    }

    // Ask server via OTP request (returns patient name if known)
    const resp = await fetch(BACKEND_URL + '/otp/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, lang })
    });
    const data = await resp.json();

    if (data.status === 'new_patient') return null;
    if (data.status === 'sent') {
      // Known patient – OTP sent, need to verify. Name wird NICHT zurückgegeben vor Verifikation
      return { match: 'exact', needsOTP: true, patient: { name: '', phone } };
    }
  } catch(e) { console.warn('findPatient error:', e); }
  return null;
}

function updatePatientPhone(oldPhone, newPhone, data) {
  // Just save with new phone – server handles it
  savePatient(newPhone, data);
}

async function start() {
  // Check honeypot
  const hp = document.getElementById('hp-field');
  if (hp && hp.value) { secShowBlocked('bot'); return; }
  secInit();
  S = { name:'', phone:'', email:'', insurance:'', insuranceLabel:'', doctor:null, handler:null, log:[] };
  resetUI();

  // Step 1: Phone number first
  // Load settings + active partners in background
  fetch(BACKEND_URL + '/settings')
    .then(r => r.json())
    .then(d => { _noNewPatients = d.settings?.no_new_patients || '0'; })
    .catch(() => {});

  fetch(BACKEND_URL + '/partners/active')
    .then(r => r.json())
    .then(d => {
      if (d.data && d.data.length > 0) {
        // Override static PARTNER_DOCTORS with dynamic ones from backend
        d.data.forEach(p => {
          PARTNER_DOCTORS[p.specialty] = {
            name: p.name,
            specialty: p.specialty,
            address: p.address || '',
            tel: p.phone || '',
            insurance_types: p.insurance_types ? p.insurance_types.split(',') : [],
          };
        });
      }
    })
    .catch(() => {});

  await bot(tx().welcome, 400);
  showPhoneInput(async (fullNumber) => {
    // Security checks
    if (!secCheckTiming()) { secShowBlocked('bot'); return; }
    const phoneCheck = secCheckPhone(fullNumber);
    if (!phoneCheck.ok) { addMsg(fullNumber, 'user'); secShowBlocked('limit'); return; }

    S.phone = fullNumber;
    addMsg(fullNumber, 'user');

    // Step 2: Check if patient is known
    const found = await findPatient(fullNumber);

    if (found && found.match === 'fuzzy') {
      // Similar number – ask if they meant the stored one
      await bot(
        lang === 'de'
          ? `Meinten Sie vielleicht die Nummer ${found.storedPhone}? (${found.patient.name})`
          : lang === 'hu'
          ? `Talán ezt a számot értette: ${found.storedPhone}? (${found.patient.name})`
          : `Did you perhaps mean the number ${found.storedPhone}? (${found.patient.name})`,
        700
      );
      setChips(
        [lang === 'de' ? `Ja, ${found.storedPhone}` : lang === 'hu' ? `Igen, ${found.storedPhone}` : `Yes, ${found.storedPhone}`,
         lang === 'de' ? 'Nein, neue Nummer' : lang === 'hu' ? 'Nem, új szám' : 'No, new number'],
        async (item, i) => {
          addMsg(item, 'user');
          if (i === 0) {
            // Use the stored patient
            S.phone = found.storedPhone;
            S.name  = found.patient.name;
            S.email = found.patient.email || '';
            await bot(tx().welcomeBack(S.name), 600);
            await handleReturningPatient(found.storedPhone, found.patient);
          } else {
            // Treat as new patient
            await collectNewPatientData(fullNumber);
          }
        }
      );

    } else if (found && found.match === 'exact') {
      S.name  = found.patient.name || '';
      S.email = found.patient.email || '';
      S.isExistingPatient = found.patient.is_existing_patient || false;

      if (found.needsOTP) {
        // Known patient – verify via OTP first
        await bot(lang === 'de'
          ? 'Willkommen zurück! Wir haben Ihnen einen 6-stelligen Code per SMS geschickt. Bitte eingeben:'
          : lang === 'hu'
          ? 'Üdvözlöm újra! SMS-ben küldtünk egy 6 jegyű kódot. Kérjük adja meg:'
          : 'Welcome back! We\'ve sent you a 6-digit code by SMS. Please enter it:', 700);
        setInput('_ _ _ _ _ _', async (code) => {
          const verifyResp = await fetch(BACKEND_URL + '/otp/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: fullNumber, code: code.replace(/\s/g,'') })
          });
          const verifyData = await verifyResp.json();
          if (verifyData.status === 'verified') {
            const p = verifyData.patient;
            S.name      = p.name || S.name;
            S.email     = p.email || '';
            S.insurance = p.insurance || '';
            // Cache locally
            const cache = JSON.parse(sessionStorage.getItem(PATIENTS_KEY) || '{}');
            cache[fullNumber.replace(/\s/g,'')] = p;
            sessionStorage.setItem(PATIENTS_KEY, JSON.stringify(cache));
            if (p.is_existing_patient) {
              await bot(lang==='de' ? '✓ Bestandspatient – herzlich willkommen zurück!'
                : lang==='hu' ? '✓ Visszatérő páciens – Üdvözlöm újra!'
                : '✓ Existing patient – welcome back!', 400);
            }
            S._isReturning = true;
            await bot(tx().welcomeBack(S.name), 500);
            await handleReturningPatient(fullNumber, p);
          } else {
            await bot(lang === 'de'
              ? 'Der Code ist leider nicht korrekt. Bitte versuchen Sie es erneut oder rufen Sie uns an: +43 1 470 65 59'
              : lang === 'hu' ? 'A kód sajnos nem helyes. Kérjük próbálja újra vagy hívjon minket: +43 1 470 65 59'
              : 'The code is incorrect. Please try again or call us: +43 1 470 65 59', 600);
            await doAnother();
          }
        });
      } else {
        await bot(tx().welcomeBack(S.name), 600);
        await handleReturningPatient(fullNumber, found.patient);
      }

    } else {
      // New patient - collect data first, then check if practice accepts new patients
      await collectNewPatientData(fullNumber);
    }
  });
}

async function handleReturningPatient(phone, patient) {
  // Show stored data for confirmation
  await bot(tx().welcomeBackConfirm(patient.name, phone, patient.email || ''), 600);
  setChips([tx().welcomeBackYes, tx().welcomeBackNo], async (item, i) => {
    addMsg(item, 'user');
    if (i === 0) {
      // All good – but if email is missing, offer to add it now
      if (!patient.email) {
        await bot(tx().welcomeBackAddEmail, 700);
        setChips([tx().welcomeBackAddEmailYes, tx().welcomeBackAddEmailSkip], async (choice, ci) => {
          addMsg(choice, 'user');
          if (ci === 0) {
            // Direkt Eingabefeld zeigen – kein extra Bot-Text
            await bot(lang === 'de' ? 'Bitte geben Sie Ihre E-Mail-Adresse ein:'
              : lang === 'hu' ? 'Kérjük adja meg e-mail címét:'
              : 'Please enter your email address:', 400);
            showEmailStep(async () => {
              savePatient(phone, { name: S.name, phone: S.phone, email: S.email });
              await continueToDoctor();
            });
          } else {
            await continueToDoctor();
          }
        });
      } else {
        await continueToDoctor();
      }
    } else {
      // Patient wants to update – re-collect name and email
      await bot(
        lang === 'de' ? 'Kein Problem! Was möchten Sie ändern?' : lang === 'hu' ? 'Rendben! Mit szeretne módosítani?' : 'No problem! What would you like to update?',
        500
      );
      setChips(
        [lang === 'de' ? 'Name ändern' : lang === 'hu' ? 'Nevet módosítani' : 'Change name',
         lang === 'de' ? 'E-Mail ändern' : lang === 'hu' ? 'E-mailt módosítani' : 'Change email',
         lang === 'de' ? 'Beides ändern' : lang === 'hu' ? 'Mindkettőt módosítani' : 'Change both'],
        async (choice, ci) => {
          addMsg(choice, 'user');
          const changeName  = ci === 0 || ci === 2;
          const changeEmail = ci === 1 || ci === 2;

          async function doSaveThen() {
            savePatient(phone, { name: S.name, phone: S.phone, email: S.email });
            await continueToDoctor();
          }

          if (changeName) {
            await bot(tx().askName, 500);
            setInput(tx().ph.name, async (name) => {
              S.name = name.trim();
              addMsg(S.name, 'user');
              if (changeEmail) {
                await bot(tx().askEmail, 600);
                showEmailStep(doSaveThen);
              } else {
                await doSaveThen();
              }
            });
          } else if (changeEmail) {
            await bot(tx().askEmail, 500);
            showEmailStep(doSaveThen);
          }
        }
      );
    }
  });
}
